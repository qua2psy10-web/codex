<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>初心者のためのAI勉強会</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1b3a;
        --surface: rgba(15, 31, 64, 0.85);
        --primary: #4f7dff;
        --primary-dark: #3356d6;
        --text: #f5f7ff;
        --muted: rgba(245, 247, 255, 0.72);
        --shadow: 0 24px 60px rgba(7, 15, 35, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: radial-gradient(circle at top, #1a3470 0%, var(--bg) 45%, #08132b 100%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px 60px;
      }

      .container {
        width: min(1100px, 100%);
        background: var(--surface);
        border-radius: 32px;
        padding: 40px 48px 48px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .container::before {
        content: "";
        position: absolute;
        inset: -120px -120px auto auto;
        width: 320px;
        height: 320px;
        background: radial-gradient(circle, rgba(121, 156, 255, 0.35), transparent 70%);
        z-index: 0;
      }

      header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .badge {
        background: rgba(79, 125, 255, 0.22);
        color: #e6edff;
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .hero {
        margin-top: 24px;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 32px;
        align-items: center;
        position: relative;
        z-index: 1;
      }

      .hero h1 {
        font-size: clamp(32px, 4vw, 44px);
        margin: 16px 0 12px;
        line-height: 1.2;
      }

      .hero p {
        color: var(--muted);
        font-size: 16px;
        line-height: 1.8;
        margin: 0 0 24px;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: var(--primary);
        color: #fff;
        padding: 14px 24px;
        border-radius: 999px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 16px 30px rgba(59, 109, 246, 0.28);
      }

      .cta span {
        background: rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 13px;
      }

      .screen {
        background: linear-gradient(135deg, #122452, #1e3f86);
        border-radius: 24px;
        padding: 26px 28px;
        color: #fff;
        box-shadow: 0 24px 50px rgba(12, 22, 50, 0.55);
        position: relative;
        overflow: hidden;
      }

      .screen::after {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
      }

      .screen-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.45);
      }

      .screen-content {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 18px;
      }

      .screen-content h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .screen-content p {
        margin: 0;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
      }

      .details {
        margin-top: 48px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        position: relative;
        z-index: 1;
      }

      .card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 22px 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .card h3 {
        margin: 0 0 10px;
        font-size: 16px;
        color: var(--muted);
      }

      .card p {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      footer {
        margin-top: 32px;
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 880px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }

        .hero {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header>
        <div>
          <div class="badge">社内イベント</div>
          <h1>初心者のためのAI勉強会</h1>
        </div>
        <a class="cta" href="#details">
          参加登録はこちら
          <span>無料</span>
        </a>
      </header>

      <section class="hero">
        <div>
          <h1>未来の働き方を、みんなで学ぶ。</h1>
          <p>
            AIはなんとなく使っているけど、どんなことができるのか。基礎から最新動向まで、
            事例とハンズオンを交えながらわかりやすく解説します。
          </p>
          <a class="cta" href="#details">スケジュールを見る</a>
        </div>
        <div class="screen" aria-label="AI勉強会のイメージ">
          <div class="screen-header">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <div class="screen-content">
            <h2>Session Agenda</h2>
            <p>・生成AIの最新トレンド<br />・業務活用のアイデア共有<br />・ミニワークショップ</p>
          </div>
        </div>
      </section>

      <section class="details" id="details">
        <div class="card">
          <h3>タイトル</h3>
          <p>初心者のためのAI勉強会</p>
        </div>
        <div class="card">
          <h3>開催日時</h3>
          <p>
            2026年2月20日<br />
            14：00〜16：00
          </p>
        </div>
        <div class="card">
          <h3>場所</h3>
          <p>会議室</p>
        </div>
      </section>

      <footer>主催：AI活用推進チーム / お問い合わせ：ai-lab@example.com</footer>
    </main>
  </body>
</html>
