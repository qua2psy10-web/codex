<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>盛土法面 安定計算</title>
    <style>
      body { font-family: sans-serif; max-width: 860px; margin: 2rem auto; line-height: 1.5; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      label { display: block; font-size: 0.95rem; }
      input, select { width: 100%; padding: 0.45rem; box-sizing: border-box; }
      button { margin-top: 1rem; padding: 0.6rem 1rem; }
      #result, .note { margin-top: 1rem; padding: 0.8rem; background: #f6f8fa; border-radius: 8px; }
      .note { background: #fff8e1; }
    </style>
  </head>
  <body>
    <h1>盛土法面の安定計算</h1>
    <p>道路土工指針の実務フローを意識し、予備検討として「無限長斜面法」と「Fellenius法（円弧探索付き分割法）」を切替えて計算できます。</p>

    <div class="note">
      <strong>注意:</strong> 本ツールは概略検討用です。実施設計では道路土工指針の最新版、設計条件、地盤調査結果、地震時照査等に基づく詳細検討を行ってください。
    </div>

    <form id="calc-form" class="grid">
      <label>
        計算手法
        <select id="method">
          <option value="infinite_slope">無限長斜面法（浅層すべり）</option>
          <option value="fellenius">Fellenius法（円弧すべり・分割法）</option>
        </select>
      </label>
      <label>必要安全率<input name="required_fs" type="number" step="0.01" value="1.20" required /></label>

      <label>法面角度 β (deg)<input name="slope_angle_deg" type="number" step="0.1" value="30" required /></label>
      <label>粘着力 c' (kPa)<input name="cohesion_kpa" type="number" step="0.1" value="10" required /></label>
      <label>内部摩擦角 φ' (deg)<input name="friction_angle_deg" type="number" step="0.1" value="32" required /></label>
      <label>単位体積重量 γ (kN/m³)<input name="unit_weight_kn_m3" type="number" step="0.1" value="18" required /></label>
      <label>地下水比 m (0-1)<input name="groundwater_ratio" type="number" step="0.01" min="0" max="1" value="0.2" required /></label>

      <div id="infinite-fields" style="display: contents;">
        <label>想定すべり深さ z (m)<input name="failure_depth_m" type="number" step="0.1" value="3" required /></label>
      </div>

      <div id="fellenius-fields" style="display: none;">
        <label>法面高さ H (m)<input name="slope_height_m" type="number" step="0.1" value="12" required /></label>
        <label>分割数 n (>=8)<input name="slices" type="number" step="1" min="8" value="16" required /></label>
        <label>円弧探索数 (>=10)<input name="search_steps" type="number" step="1" min="10" value="36" required /></label>
      </div>
    </form>

    <button id="calc">計算する</button>
    <div id="result">結果待ち</div>

    <script src="./stability.js"></script>
  </body>
</html>
