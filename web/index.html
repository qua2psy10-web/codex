<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>盛土法面 安定計算</title>
    <style>
      body { font-family: sans-serif; max-width: 760px; margin: 2rem auto; line-height: 1.5; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      label { display: block; font-size: 0.95rem; }
      input { width: 100%; padding: 0.45rem; box-sizing: border-box; }
      button { margin-top: 1rem; padding: 0.6rem 1rem; }
      #result { margin-top: 1rem; padding: 0.8rem; background: #f6f8fa; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>盛土法面の簡易安定計算</h1>
    <p>無限長斜面モデルに基づき、安全率(FS)を試算します。</p>

    <form id="calc-form" class="grid">
      <label>法面角度 β (deg)<input name="slope_angle_deg" type="number" step="0.1" value="30" required /></label>
      <label>粘着力 c' (kPa)<input name="cohesion_kpa" type="number" step="0.1" value="10" required /></label>
      <label>内部摩擦角 φ' (deg)<input name="friction_angle_deg" type="number" step="0.1" value="32" required /></label>
      <label>単位体積重量 γ (kN/m³)<input name="unit_weight_kn_m3" type="number" step="0.1" value="18" required /></label>
      <label>想定すべり深さ z (m)<input name="failure_depth_m" type="number" step="0.1" value="3" required /></label>
      <label>地下水比 m (0-1)<input name="groundwater_ratio" type="number" step="0.01" min="0" max="1" value="0.2" required /></label>
      <label>必要安全率<input name="required_fs" type="number" step="0.01" value="1.2" required /></label>
    </form>

    <button id="calc">計算する</button>
    <div id="result">結果待ち</div>

    <script src="./stability.js"></script>
  </body>
</html>
